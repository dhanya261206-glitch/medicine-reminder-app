<!DOCTYPE html>
<html>
<head>
    <title>SMS Alert</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.2);

            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    {{ sms }}
</div>

<a href="/">⬅ Back to Dashboard</a>

</body>
</html>
