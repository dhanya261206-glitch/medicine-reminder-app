<!DOCTYPE html>
<html>
<head>
    <title>Edit Medicine</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="card">

        <h2>Edit Medicine</h2>

        <form method="POST">

            <label>Medicine Name</label>
            <input type="text"
                   name="medicine_name"
                   value="{{ medicine[2] }}">

            <label>Dosage</label>
            <input type="text"
                   name="dosage"
                   value="{{ medicine[3] }}">

            <label>Time</label>
            <input type="text"
                   name="time"
                   value="{{ medicine[4] }}">

            <button type="submit">
                Update Medicine
            </button>

        </form>

    </div>

</div>

</body>
</html>
