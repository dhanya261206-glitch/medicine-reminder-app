<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="card">

        <h2>Edit Patient</h2>

        <form method="POST">

            <label>Name</label>
            <input type="text"
                   name="name"
                   value="{{ patient[1] }}">

            <label>Age</label>
            <input type="text"
                   name="age"
                   value="{{ patient[2] }}">

            <label>Caregiver</label>
            <input type="text"
                   name="caregiver"
                   value="{{ patient[3] }}">

            <label>Phone</label>
            <input type="text"
                   name="phone"
                   value="{{ patient[4] }}">

            <button type="submit">
                Update Patient
            </button>

        </form>

    </div>

</div>

</body>
</html>
